plugins {
    id 'com.android.application'
}

android {
    namespace 'thirteen.miaofixer'
    compileSdk 34

    defaultConfig {
        applicationId "thirteen.miaofixer"
        minSdk 29
        targetSdk 34
        versionCode 3
        versionName "1.2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
